id: xhs_grass_v1
name: 小红书种草 v1
version: 1.0.0
category: preset
description: 适合美食/生活种草场景，俏皮活泼、第一人称、300-500字
inputs:
  topic:
    type: string
    required: true
  style_hint:
    type: string
    required: false
    default: "俏皮、活泼"
targets:
  - xhs_text
model_recommended:
  primary: deepseek-chat
  fallback:
    - hy3-preview
prompt_template: prompt.tmpl
output_schema:
  type: object
  required:
    - xhs_text
    - tags
  properties:
    xhs_text:
      type: string
      minLength: 100
      maxLength: 800
    tags:
      type: array
      items:
        type: string
      minItems: 2
      maxItems: 10
post_hook: xhs_format
visibility: public
status: active
scripts_path: ""
templates_path: ""
examples_path: ""
